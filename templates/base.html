  <script src="https://cdn.tailwindcss.com"></script>

<style>
html, body{
  font-family:'Manrope', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
  margin:0;
  padding:0;
  overflow-x:hidden;
  min-height:100%;
  background-color:#08101f;
}

*{ font-family:inherit; }

body{
  position:relative;
  color:white;
  background:
    radial-gradient(circle at 18% 38%, rgba(124, 58, 237, 0.18), transparent 24%),
    radial-gradient(circle at 72% 24%, rgba(59, 130, 246, 0.08), transparent 20%),
    #08101f;
}

/* grille pointillée globale */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image: radial-gradient(rgba(148,163,184,0.18) 1px, transparent 1px);
  background-size:34px 34px;
  opacity:.35;
  pointer-events:none;
  z-index:-2;
}

/* voile global très léger */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(8,16,31,0.08),
    rgba(8,16,31,0.03) 30%,
    rgba(8,16,31,0.16)
  );
  pointer-events:none;
  z-index:-1;
}


  /* Navigation flèches timeline */
  #timelineNav{ display:flex; align-items:center; gap:1.5rem; }
  .nav-arrow{
    background:none;
    border:none;
    padding:0;
    cursor:pointer;
    flex-shrink:0;
    line-height:0;
  }
  .nav-arrow svg polyline{ stroke:rgba(255,255,255,0.35); transition:stroke .2s ease; }
  .nav-arrow:hover svg polyline{ stroke:rgba(255,255,255,0.9); }
  .nav-arrow:disabled{ opacity:.15; cursor:default; pointer-events:none; }

  /* Timeline – carte */
  .timeline-card{
    position:relative;
    background:rgba(255,255,255,0.03);
    border:.5px solid rgba(255,255,255,0.07);
    border-radius:12px;
    padding:2.5rem 3rem;
    overflow:hidden;
    transition:border-color .3s ease;
  }
  .timeline-card:hover{ border-color:rgba(255,255,255,0.15); }

  /* Watermark année */
  .year-watermark{
    position:absolute;
    bottom:-10px;
    right:-5px;
    font-size:180px;
    font-weight:700;
    color:#fff;
    opacity:0.10;
    line-height:1;
    pointer-events:none;
    user-select:none;
  }

  /* Badge techno */
  .tech-badge{
    display:inline-block;
    padding:5px 14px;
    border-radius:999px;
    border:.5px solid;
    font-size:13px;
    font-weight:500;
    letter-spacing:.03em;
  }

  /* Typographie carte */
  .card-title{ font-size:22px; font-weight:500; color:#fff; margin:.75rem 0 .5rem; }
  .card-text{ font-size:15px; line-height:1.8; color:rgba(255,255,255,0.88); }
  .card-text strong{ color:#ffffff; font-weight:500; }

  /* Hero – mobile */
  @media (max-width: 768px) {
    img[alt="Photo de profil"]{ width:180px !important; height:180px !important; }
    header h1{ font-size:1.75rem !important; line-height:1.2 !important; }
    header > div:last-child{ padding-left:20px !important; padding-right:20px !important; }
    header p{ font-size:1.05rem !important; line-height:1.6 !important; }
  }

  /* Sections contenu – mobile */
  @media (max-width: 768px) {
    section h2{ font-size:22px !important; }
    section{ padding-top:2.5rem !important; padding-bottom:2.5rem !important; }
    section p, section li{ font-size:13px !important; }
    section .grid{ gap:12px !important; }
  }

  /* Services & Technos – mobile */
  @media (max-width: 768px) {
    .services-section h2{ font-size:20px !important; }
    .technos-section > div{ box-sizing:border-box !important; width:100% !important; padding-left:1rem !important; padding-right:1rem !important; }
    .technos-section .grid{ padding-left:1rem !important; padding-right:1rem !important; }
    .technos-section h2, .technos-section > div > p{
      width:100% !important; text-align:center !important;
      padding-left:0 !important; padding-right:0 !important;
      margin-left:0 !important; margin-right:0 !important;
    }
    .technos-section div.card{ margin-left:auto !important; margin-right:auto !important; width:calc(100% - 2rem) !important; }
    div.card{ margin-left:1rem !important; margin-right:1rem !important; }
    div.card h3{ font-size:14px !important; }
    div.card p{ font-size:13px !important; }
  }

  /* Références logos – mobile */
  @media (max-width: 768px) {
    .ref-logos-grid{ display:grid !important; grid-template-columns:repeat(3, 1fr) !important; gap:16px 8px !important; padding:0 8px !important; align-items:center !important; max-width:100% !important; overflow:hidden !important; }
    .ref-logos-grid img{ max-width:100% !important; max-height:45px !important; width:auto !important; height:auto !important; object-fit:contain !important; margin:0 auto !important; display:block !important; }
    .ref-logos-grid img[alt="Middleway"]{ max-width:90px !important; width:90px !important; height:auto !important; max-height:none !important; }
    .ref-logos-grid img[alt="Gerflor"]{ max-width:90px !important; max-height:90px !important; width:90px !important; }
    .ref-logos-grid img[alt="Gineys"]{ max-height:45px !important; }
    .ref-logos-grid img[alt="Entoria"]{ max-height:30px !important; max-width:80px !important; }
    .ref-logos-grid img[alt="Alliade"]{ max-height:55px !important; max-width:120px !important; }
    .ref-logos-grid img[alt="alliade"]{ grid-column:2 !important; }
  }

  /* Certifications – mobile */
  @media (max-width: 768px) {
    .certif-grid{ display:grid !important; grid-template-columns:1fr 1fr !important; gap:12px !important; padding-left:1rem !important; padding-right:1rem !important; box-sizing:border-box !important; }
    .certif-grid a.card{ margin-left:auto !important; margin-right:auto !important; width:100% !important; }
    .certif-grid .w-14{ width:55px !important; height:55px !important; }
    .certif-grid h3{ font-size:12px !important; }
    .certif-grid p{ font-size:11px !important; }
  }

  /* Menu drawer */
  #sideMenu{ width:280px !important; background:linear-gradient(160deg, rgba(10,18,40,0.97) 0%, rgba(6,13,26,0.98) 100%) !important; border-left:1px solid rgba(124,58,237,0.2) !important; padding:90px 28px 28px 28px !important; box-shadow:-20px 0 60px rgba(0,0,0,0.6), inset 1px 0 0 rgba(124,58,237,0.08) !important; backdrop-filter:blur(24px) !important; -webkit-backdrop-filter:blur(24px) !important; }
  .menu-link{ font-size:17px !important; padding:14px 0 !important; }
  .menu-link:hover{ color:#fff !important; }
  .menu-link.active{ color:#fff !important; }

  /* Burger + logo navbar – mobile */
  @media (max-width: 768px) {
    #fabButton{ width:28px; height:28px; padding:4px !important; font-size:14px; }
    a[href="/"] img{ height:32px; width:auto; }
  }

  /* Drawer menu – mobile */
  @media (max-width: 768px) {
    #sideMenu{ width:75% !important; max-width:280px !important; padding:80px 24px 24px 24px !important; }
    .menu-link{ font-size:16px !important; padding:12px 0 !important; }
  }

  /* Timeline – mobile */
  @media (max-width: 768px) {
    .timeline-card{ padding:1.25rem; width:calc(100% - 1rem) !important; margin-left:auto !important; margin-right:auto !important; }
    .timeline-card img{ display:none; }
    .card-title{ font-size:18px; }
    .card-text{ font-size:13px; }
    .year-watermark{ font-size:90px; }
    #timeline{ min-height:unset !important; position:relative; }
    #timelineWrapper{ overflow:hidden; flex:1 !important; min-width:0 !important; }
    #timelineNav{ gap:4px !important; }
    .nav-arrow{ width:20px !important; flex-shrink:0 !important; }
    #path{ padding-bottom:2rem; }
    .year-slide.is-active{
      opacity:1 !important;
      visibility:visible !important;
      position:relative !important;
      min-height:unset !important;
    }
  }

  /* Transitions entre slides – aucun re-layout */
  #timeline{ position:relative; }
  .year-slide{
    position:absolute;
    top:0; left:0; width:100%;
    opacity:0;
    visibility:hidden;
    transition:opacity .25s ease;
  }
  .year-slide.is-active{
    opacity:1;
    visibility:visible;
  }

  /* Cartes */
  .card{
    background:rgba(255,255,255,0.03);
    border:.5px solid rgba(255,255,255,0.07);
    border-radius:1rem;
    transition:border-color .3s ease;
  }
  .card:hover{ border-color:rgba(255,255,255,0.15); }

  /* Logos références */
  .ref-logo{
    filter:brightness(0) invert(1);
    opacity:.55;
    transition:all .3s ease;
  }
  .ref-logo:hover{ filter:none; opacity:1; }

  /* Logos à fond sombre/transparent — rester en blanc au hover */
  .ref-logo-inverted{
    filter:brightness(0) invert(1);
    opacity:.55;
    transition:all .3s ease;
  }
  .ref-logo-inverted:hover{ filter:brightness(0) invert(1); opacity:1; }
  .ref-logos-grid img[alt="Erasteel"]{ max-height:14px !important; }

  /* Listes avec checkmarks */
  .check-list{ list-style:none; padding-left:0; }
  .check-list li::before{
    content:'✓';
    color:rgba(255,255,255,0.5);
    font-size:.8em;
    font-weight:400;
    margin-right:.5rem;
  }

  /* Burger au-dessus de tout */
  .site-header{ position:fixed; top:0; left:0; right:0; z-index:9999; pointer-events:auto; isolation:isolate; }
  #path, #timelineWrapper, #timeline{ position:relative; z-index:0; }

  /* Décors non cliquables */
  #path .decor, #path canvas, #path [data-decor], #path::before, #path::after{
    pointer-events:none;
  }
</style>

<body class="text-white font-sans">



<!-- Bouton hamburger / close -->
<div id="fabContainer" class="fixed top-5 right-3 z-50">
  <button id="fabButton" class="flex items-center justify-center text-white text-base md:text-lg bg-transparent hover:bg-white hover:text-black transition" style="padding:6px 10px; border:1.5px solid white;">
    <svg id="iconBurger" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
    <svg id="iconClose" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none;">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>


<div id="menuOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:30;opacity:0;pointer-events:none;transition:opacity 300ms;"></div>

<div id="sideMenu"
     class="fixed top-0 right-0 text-white z-40 flex flex-col items-start" style="height:100vh;transform:translateX(100%);transition:transform 300ms;backdrop-filter:blur(24px);">

  <!-- accent top gradient bar -->
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,rgba(124,58,237,0.7),rgba(59,130,246,0.5),transparent);pointer-events:none;"></div>

  <div style="color:#64748b;font-size:10px;letter-spacing:1.5px;margin-bottom:10px;font-weight:600;">NAVIGATION</div>

  <nav id="sideMenuNav" style="display:flex;flex-direction:column;">
    <a href="/" class="menu-link" style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06);color:#fff;font-size:15px;font-weight:500;text-decoration:none;">
      Accueil
    </a>
    <a href="/contact" class="menu-link" style="padding:12px 0;color:#cbd5e1;font-size:15px;text-decoration:none;">
      Contactez-moi
    </a>
  </nav>

  <div style="margin-top:20px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08);">
    <div style="color:#64748b;font-size:10px;letter-spacing:1.5px;margin-bottom:10px;font-weight:600;">RÉSEAUX</div>
    <a href="https://www.linkedin.com/in/anas-fata-28212a85/" target="_blank" aria-label="LinkedIn" class="hover:opacity-80">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" style="color: #f5f3f5;" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-10h3v10zm-1.5-11.268c-.966 0-1.75-.795-1.75-1.732s.784-1.732 1.75-1.732 1.75.795 1.75 1.732-.784 1.732-1.75 1.732zm13.5 11.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-10h3v1.43c1.396-2.586 7-2.777 7 2.476v6.094z"/>
      </svg>
    </a>
  </div>
</div>




  <!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({ duration: 1000, once: true });

const fabButton = document.getElementById('fabButton');
const sideMenu = document.getElementById('sideMenu');
let menuOpen = false;

fabButton.addEventListener('click', () => {
  menuOpen = !menuOpen;
  sideMenu.style.transform = menuOpen ? 'translateX(0)' : 'translateX(100%)';
  const overlay = document.getElementById('menuOverlay');
  overlay.style.opacity = menuOpen ? '1' : '0';
  overlay.style.pointerEvents = menuOpen ? 'auto' : 'none';
  document.getElementById('iconBurger').style.display = menuOpen ? 'none' : 'block';
  document.getElementById('iconClose').style.display = menuOpen ? 'block' : 'none';
});

document.getElementById('menuOverlay').addEventListener('click', () => {
  menuOpen = false;
  sideMenu.style.transform = 'translateX(100%)';
  document.getElementById('menuOverlay').style.opacity = '0';
  document.getElementById('menuOverlay').style.pointerEvents = 'none';
  document.getElementById('iconBurger').style.display = 'block';
  document.getElementById('iconClose').style.display = 'none';
});

// Marquer le lien actif selon l'URL
document.querySelectorAll('#sideMenuNav .menu-link').forEach(link => {
  if (link.getAttribute('href') === window.location.pathname) {
    link.classList.add('active');
  }
});


</script>
