<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EWQY17K8G2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EWQY17K8G2');
  </script>
  <meta charset="UTF-8">
  <title>Afamind - Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, body { font-family: 'Manrope', sans-serif; }

    .contact-bg {
      background-color: #08101f;
      background-image:
        radial-gradient(circle at 15% 30%, rgba(124,58,237,0.16), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(59,130,246,0.09), transparent 22%),
        radial-gradient(circle at 60% 80%, rgba(124,58,237,0.08), transparent 25%);
    }

    .dot-grid {
      background-image: radial-gradient(rgba(148,163,184,0.12) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    .form-card {
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(255,255,255,0.09);
      border-radius: 1.25rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .field-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      transition: border-color .2s ease, box-shadow .2s ease;
      outline: none;
    }
    .field-input:focus {
      border-color: rgba(124,58,237,0.6);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
    }
    .field-input::placeholder { color: rgba(255,255,255,0.25); }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all .25s ease;
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(59,130,246,0.2));
      border: 1px solid rgba(124,58,237,0.4);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,58,237,0.5), rgba(59,130,246,0.4));
      opacity: 0;
      transition: opacity .25s ease;
    }
    .btn-submit:hover::before { opacity: 1; }
    .btn-submit span { position: relative; z-index: 1; }

    .back-link {
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      text-decoration: none;
      transition: color .2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .back-link:hover { color: rgba(255,255,255,0.8); }

    /* Divider gradient */
    .divider-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), rgba(59,130,246,0.2), transparent);
      margin: 8px 0 20px;
    }
  </style>
</head>

<body class="contact-bg dot-grid text-white min-h-screen flex flex-col items-center justify-center px-4 py-16">

  <div style="max-width:520px;width:100%;display:flex;flex-direction:column;gap:32px;">

    <!-- Header -->
    <div style="text-align:center;">
      <p style="font-size:11px;letter-spacing:2px;font-weight:600;color:rgba(124,58,237,0.8);margin-bottom:10px;text-transform:uppercase;">Prise de contact</p>
      <h1 style="font-size:clamp(2rem,6vw,2.6rem);font-weight:800;line-height:1.1;letter-spacing:-0.03em;margin:0 0 10px;">Contactez-moi</h1>
      <p style="color:rgba(255,255,255,0.45);font-size:14px;line-height:1.6;margin:0;">
        Remplissez le formulaire ci-dessous et je vous répondrai rapidement.
      </p>
    </div>

    <!-- Form card -->
    <div class="form-card" style="padding:32px 28px;">

      <div class="divider-line"></div>

      <form action="/send-message" method="POST" style="display:flex;flex-direction:column;gap:20px;">

        <!-- Nom -->
        <div>
          <label for="name" class="field-label">
            Nom <span style="color:#f87171;">*</span>
          </label>
          <input type="text" id="name" name="name" required
                 class="field-input" placeholder="Votre nom">
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="field-label">
            Adresse email <span style="color:#f87171;">*</span>
          </label>
          <input type="email" id="email" name="email" required
                 class="field-input" placeholder="votre@email.com">
        </div>

        <!-- Objet -->
        <div>
          <label for="subject" class="field-label">
            Objet <span style="color:#f87171;">*</span>
          </label>
          <input type="text" id="subject" name="subject" required
                 class="field-input" placeholder="Sujet de votre message">
        </div>

        <!-- Message -->
        <div>
          <label for="message" class="field-label">
            Message <span style="color:#f87171;">*</span>
          </label>
          <textarea id="message" name="message" rows="5" required
                    class="field-input" placeholder="Décrivez votre projet ou votre besoin…"
                    style="resize:vertical;min-height:120px;"></textarea>
        </div>

        <!-- Note -->
        <p style="font-size:12px;color:rgba(255,255,255,0.28);font-style:italic;margin:0;">
          (<span style="color:#f87171;">*</span>) Champs obligatoires.
        </p>

        <!-- Submit -->
        <button type="submit" class="btn-submit">
          <span>Envoyer</span>
        </button>

      </form>

      <div style="display:flex;align-items:center;gap:12px;margin:20px 0 4px;">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.15);"></div>
        <span style="font-size:12px;color:rgba(100,116,139,1);">ou</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.15);"></div>
      </div>

      <a href="https://www.linkedin.com/in/anas-fata-28212a85/"
         target="_blank"
         rel="noopener noreferrer"
         style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.25);border-radius:8px;color:rgba(203,213,225,1);font-size:14px;text-decoration:none;transition:background .2s ease;"
         onmouseover="this.style.background='rgba(255,255,255,0.05)'"
         onmouseout="this.style.background='transparent'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
        </svg>
        Me joindre sur LinkedIn
      </a>

    </div>

    <!-- Back -->
    <div style="text-align:center;">
      <a href="/" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Retour à l'accueil
      </a>
    </div>

  </div>
</body>
</html>
